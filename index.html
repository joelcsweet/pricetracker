<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Price Tracker">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:        #8b5cf6;
    --brand-dark:   #7c3aed;
    --brand-soft:   #ede9fe;
    --brand-faint:  #f5f3ff;
    --green:        #16a34a;
    --green-soft:   #dcfce7;
    --amber:        #d97706;
    --amber-soft:   #fef3c7;
    --red:          #dc2626;
    --red-soft:     #fee2e2;
    --bg:           #f4f3f8;
    --surface:      #ffffff;
    --border:       #e8e6f0;
    --border-strong:#d4d0e4;
    --text:         #1e1a2e;
    --text-soft:    #6e6a82;
    --text-faint:   #a09cb8;
    --shadow:       0 1px 3px rgba(30,26,46,.05), 0 4px 16px rgba(30,26,46,.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── Top bar ──────────────────────────────────────────────────────────── */
  .topbar {
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-logo {
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -.3px;
  }

  .topbar-logo span {
    opacity: .65;
    font-weight: 500;
  }

  .topbar-actions { display: flex; gap: 8px; }

  /* ── App body ─────────────────────────────────────────────────────────── */
  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 100px;
  }

  @media (max-width: 600px) {
    .topbar { padding: 0 16px; }
    .app    { padding: 20px 14px 90px; }
  }

  /* ── Stats strip ──────────────────────────────────────────────────────── */
  .stats-strip {
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 20px;
    font-weight: 500;
  }

  .stats-strip strong { color: var(--brand); }

  /* ── Buttons ──────────────────────────────────────────────────────────── */
  button {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    padding: 9px 18px;
    transition: filter .15s, transform .1s;
  }

  button:active  { transform: scale(.97); }
  button:disabled { opacity: .45; cursor: not-allowed; }

  .btn-primary {
    background: #fff;
    color: var(--brand);
  }
  .btn-primary:hover { filter: brightness(.96); }

  .btn-ghost {
    background: rgba(255,255,255,.18);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.35);
  }
  .btn-ghost:hover { background: rgba(255,255,255,.28); }

  .btn-brand {
    background: var(--brand);
    color: #fff;
  }
  .btn-brand:hover { background: var(--brand-dark); }

  .btn-outline {
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border-strong);
  }
  .btn-outline:hover { background: var(--bg); }

  .btn-green {
    background: var(--green);
    color: #fff;
  }

  .btn-sm {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 7px;
  }

  .btn-icon {
    padding: 6px 9px;
    font-size: 15px;
    line-height: 1;
  }

  /* ── Product list ─────────────────────────────────────────────────────── */
  .product-list { display: flex; flex-direction: column; gap: 12px; }

  /* ── Card ─────────────────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: 14px;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--border-strong);
    padding: 18px 20px;
    transition: box-shadow .2s;
  }

  .card:hover { box-shadow: 0 2px 6px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.1); }

  .card.status-target_hit  { border-left-color: var(--green); }
  .card.status-ok          { border-left-color: var(--brand); }
  .card.status-needs_attention { border-left-color: var(--amber); }
  .card.status-error       { border-left-color: var(--red); }
  .card.status-pending     { border-left-color: var(--border-strong); }

  .card.card-inactive { opacity: .55; border-left-color: var(--border-strong); }
  .card.card-inactive:hover { opacity: .8; }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }

  .card-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

  /* iOS-style toggle switch */
  .toggle-switch {
    position: relative;
    width: 40px;
    height: 24px;
    border-radius: 12px;
    border: none;
    background: var(--border-strong);
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
    transition: background .2s ease;
  }
  .toggle-switch.on { background: var(--green); }
  .toggle-knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
    transition: transform .2s ease;
  }
  .toggle-switch.on .toggle-knob { transform: translateX(16px); }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 12px;
  }

  .card-meta strong { color: var(--text); font-weight: 600; }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .2px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    margin-top: 4px;
  }

  .badge-ok        { background: var(--brand-soft); color: var(--brand); }
  .badge-hit       { background: var(--green-soft); color: var(--green); }
  .badge-attention { background: var(--amber-soft); color: var(--amber); }
  .badge-error     { background: var(--red-soft);   color: var(--red); }
  .badge-pending   { background: var(--bg);         color: var(--text-faint); border: 1px solid var(--border); }
  .badge-paused    { background: var(--bg);         color: var(--text-faint); border: 1px solid var(--border); }

  /* URL price rows */
  .url-price-list { list-style: none; display: flex; flex-direction: column; gap: 7px; margin-bottom: 4px; }

  .url-price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    background: var(--bg);
    border-radius: 8px;
    padding: 7px 10px;
  }

  .url-price-row .url-price-val       { font-weight: 700; color: var(--text); white-space: nowrap; font-size: 14px; }
  .url-price-row .url-price-val.hit   { color: var(--green); }
  .url-price-row .url-price-none      { color: var(--text-faint); white-space: nowrap; font-weight: 600; }
  .url-price-row .url-price-method    { font-size: 10px; color: var(--text-faint); white-space: nowrap; background: var(--border); padding: 2px 6px; border-radius: 4px; }
  .url-price-row .url-link            { color: var(--text-soft); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; font-size: 12px; }
  .url-price-row .url-link:hover      { color: var(--brand); }

  /* Manual price inline input */
  .url-inline-edit {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 6px 10px;
    background: var(--amber-soft);
    border-radius: 8px;
    border: 1px solid #fde68a;
  }

  .url-inline-edit input {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 8px;
    border: 1.5px solid #fcd34d;
    border-radius: 6px;
    background: #fff;
    color: var(--text);
    outline: none;
  }
  .url-inline-edit input:focus { border-color: var(--amber); }

  /* Chart */
  .chart-wrap {
    margin-top: 12px;
    height: 52px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
  }

  .card-checked {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 10px;
    font-weight: 500;
  }

  /* ── Modal ────────────────────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(17,24,39,.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 460px;
    border: 1px solid var(--border);
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--text);
    letter-spacing: -.3px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .4px;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 6px;
  }

  .field input, .field textarea {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 10px 12px;
    border: 1.5px solid var(--border-strong);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }

  .field textarea { resize: vertical; min-height: 90px; font-size: 14px; }
  .field .field-hint { font-size: 11px; color: var(--text-faint); margin-top: 5px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 22px;
  }

  /* ── Empty state ──────────────────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 70px 20px;
    color: var(--text-soft);
  }

  .empty .icon { font-size: 44px; margin-bottom: 14px; }
  .empty p { font-size: 15px; line-height: 1.6; }

  /* ── Toast ────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 11px 20px;
    border-radius: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    transition: transform .25s ease;
    z-index: 200;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Spinner ──────────────────────────────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {
    width: 13px;
    height: 13px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    display: inline-block;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 5px;
  }
</style>
</head>
<body>

<!-- Sticky top bar -->
<div class="topbar">
  <div class="topbar-logo">Price<span>Tracker</span></div>
  <div class="topbar-actions">
    <button class="btn-primary" onclick="openAddModal()">+ Add</button>
  </div>
</div>

<div class="app">
  <p class="stats-strip" id="subtitle">Loading…</p>

  <!-- Product list -->
  <div class="product-list" id="productList"></div>
</div>

<!-- Add / Edit modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h2 id="modalTitle">Add product</h2>
    <div class="field">
      <label>Product name</label>
      <input id="fName" type="text" placeholder="e.g. Sony WH-1000XM5">
    </div>
    <div class="field">
      <label>URLs — one per line</label>
      <textarea id="fUrl" placeholder="https://www.amazon.com.au/…&#10;https://www.jbhifi.com.au/…"></textarea>
      <p class="field-hint">Paste one URL per line. All will be checked; the lowest price found is used.</p>
    </div>
    <div class="field">
      <label>Target price (AUD)</label>
      <input id="fTarget" type="number" min="0" step="0.01" placeholder="e.g. 299.00">
    </div>
    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn-brand" id="modalSaveBtn" onclick="saveProduct()">Save product</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// Replace these with your actual Worker URL and API_SECRET
const WORKER_URL = 'https://pricetracker.joelsweet.workers.dev';
const API_SECRET = 'pricetracker-joelsweet-2026';

// ── State ─────────────────────────────────────────────────────────────────────
let products   = [];
let editingId  = null;
let checking   = new Set(); // product IDs currently being checked

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot() {
  await loadProducts();
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(path, options = {}) {
  const res = await fetch(`${WORKER_URL}${path}`, {
    ...options,
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${API_SECRET}`,
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

// ── Load & render ─────────────────────────────────────────────────────────────
async function loadProducts() {
  try {
    products = await api('/products');
    render();
    updateSubtitle();
    // Load price history for all products so charts persist across devices/refreshes
    products.forEach(p => loadAndDrawSparkline(p.id));
  } catch (e) {
    showToast('Could not load products: ' + e.message);
  }
}

function render() {
  const list = document.getElementById('productList');

  if (!products.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="icon">🏷️</div>
        <p>No products yet.<br>Add one to start tracking prices.</p>
      </div>`;
    return;
  }

  // Paused products sink to the bottom; original created_at order is preserved
  // within each group so resuming puts a product back where it was.
  const isActive = p => p.active == null || Number(p.active) === 1;
  const sorted = [...products].sort((a, b) => Number(isActive(b)) - Number(isActive(a)));

  list.innerHTML = sorted.map(p => cardHtml(p)).join('');

  // Draw sparklines after DOM settles
  products.forEach(p => {
    if (p._history?.length >= 1) drawSparkline(p);
  });
}

function cardHtml(p) {
  const isChecking = checking.has(p.id);
  const priceStr   = p.last_price != null
    ? `$${Number(p.last_price).toFixed(2)}`
    : null;

  const priceClass = p.status === 'target_hit' ? 'price-hit'
                   : p.last_price != null       ? 'price-miss'
                   :                              'price-none';

  const priceDisplay = priceStr
    ? `<span class="price-current ${priceClass}">${priceStr} AUD</span>`
    : `<span class="price-none">Not yet checked</span>`;

  const badge = badgeHtml(p.status);

  const checkedStr = p.last_checked_at
    ? `Last checked ${relTime(p.last_checked_at)}`
    : 'Not yet checked';


  const sparklineSection = `<div class="chart-wrap" id="chart-${p.id}"></div>`;

  const checkBtnLabel = isChecking
    ? `<span class="spinner"></span>Checking…`
    : '↻ Check';

  const isActive   = p.active == null || Number(p.active) === 1;
  const toggleTitle = isActive ? 'Pause — skip daily check to save credits' : 'Resume daily checks';

  return `
    <div class="card status-${p.status || 'pending'}${isActive ? '' : ' card-inactive'}" id="card-${p.id}">
      <div class="card-head">
        <div>
          <div class="card-name">${escHtml(p.name)}</div>
          ${isActive ? badge : `<span class="badge badge-paused">⏸ Paused</span>`}
        </div>
        <div class="card-actions">
          <button class="toggle-switch${isActive ? ' on' : ''}" onclick="toggleActive('${p.id}')"
                  title="${toggleTitle}" role="switch" aria-checked="${isActive}">
            <span class="toggle-knob"></span>
          </button>
          <button class="btn-outline btn-sm" onclick="openEditModal('${p.id}')" title="Edit">✎</button>
          <button class="btn-outline btn-sm" onclick="checkOne('${p.id}')"
                  ${isChecking ? 'disabled' : ''}>${checkBtnLabel}</button>
          <button class="btn-outline btn-sm btn-icon" onclick="deleteProduct('${p.id}')" title="Delete">✕</button>
        </div>
      </div>

      <div class="card-meta">
        <span>Target: <strong>$${Number(p.target_price).toFixed(2)} AUD</strong></span>
      </div>

      <ul class="url-price-list">
        ${urlPriceRows(p)}
      </ul>

      ${sparklineSection}

      <div class="card-checked">${checkedStr}</div>
    </div>`;
}

function urlPriceRows(p) {
  const urls    = p.url.split('\n').map(u => u.trim()).filter(Boolean);
  const results = (() => { try { return JSON.parse(p.url_results || '[]'); } catch { return []; } })();

  // Only offer manual entry once a check has actually completed (not pending / mid-check)
  const busy        = checking.has(p.id);
  const checkedOnce = !!p.last_checked_at && p.status !== 'pending';

  return urls.map((u, i) => {
    const r      = results.find(r => r.url === u);
    const price  = r?.price;
    const method = r?.method;
    const isHit  = price != null && price <= p.target_price;

    const priceHtml = price != null
      ? `<span class="url-price-val${isHit ? ' hit' : ''}">$${Number(price).toFixed(2)}</span>`
      : busy
        ? `<span class="url-price-none">…</span>`
        : `<span class="url-price-none">—</span>`;

    const methodHtml = method ? `<span class="url-price-method">· ${method}</span>` : '';

    const showManual = price == null && checkedOnce && !busy;
    const manualInputHtml = showManual ? `
      <li style="list-style:none;margin-top:4px;padding-left:0">
        <div class="url-inline-edit">
          <input type="number" min="0" step="0.01" id="manual-url-${p.id}-${i}"
                 placeholder="Enter price manually"
                 onkeydown="if(event.key==='Enter')saveManualUrlPrice('${p.id}',${i})">
          <button class="btn-green btn-sm" onclick="saveManualUrlPrice('${p.id}',${i})">Save</button>
        </div>
      </li>` : '';

    return `
      <li class="url-price-row">
        ${priceHtml}
        ${methodHtml}
        <a class="url-link" href="${escHtml(u)}" target="_blank" rel="noopener">${escHtml(truncate(u, 60))}</a>
      </li>
      ${manualInputHtml}`;
  }).join('');
}

async function saveManualUrlPrice(productId, urlIdx) {
  const input = document.getElementById(`manual-url-${productId}-${urlIdx}`);
  const price = parseFloat(input?.value);
  if (!input || isNaN(price) || price <= 0) { showToast('Enter a valid price.'); return; }

  const p       = products.find(x => x.id === productId);
  const urls    = p.url.split('\n').map(u => u.trim()).filter(Boolean);
  const results = (() => { try { return JSON.parse(p.url_results || '[]'); } catch { return []; } })();

  // Update or insert the result for this URL
  const existing = results.find(r => r.url === urls[urlIdx]);
  if (existing) { existing.price = price; existing.method = 'manual'; }
  else          { results.push({ url: urls[urlIdx], price, method: 'manual' }); }

  // Best price across all URLs
  const bestPrice = Math.min(...results.filter(r => r.price != null).map(r => r.price));

  try {
    const saved = await api(`/products/${productId}/manual-price`, {
      method: 'POST',
      body: JSON.stringify({ price: bestPrice, url_results: JSON.stringify(results) }),
    });
    const idx = products.findIndex(x => x.id === productId);
    if (idx >= 0) {
      products[idx] = { ...products[idx], last_price: bestPrice, status: saved.status,
                        url_results: JSON.stringify(results) };
    }
    renderCard(productId);
    updateSubtitle();
    await loadAndDrawSparkline(productId);
    showToast('Price saved.');
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

function badgeHtml(status) {
  const map = {
    ok:              ['badge-ok',        '↑ Above target'],
    target_hit:      ['badge-hit',       '✓ Target hit!'],
    needs_attention: ['badge-attention', '⚠ Enter price manually'],
    error:           ['badge-error',     '✕ Check failed'],
    pending:         ['badge-pending',   '· Not checked yet'],
  };
  const [cls, label] = map[status] || map.pending;
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── Sparkline ──────────────────────────────────────────────────────────────────
async function loadAndDrawSparkline(productId) {
  try {
    const history = await api(`/products/${productId}/history`);
    if (history.length < 1) return;
    const p = products.find(x => x.id === productId);
    if (p) { p._history = history; drawSparkline(p); }
  } catch { /* silently skip */ }
}

function drawSparkline(p) {
  const wrap = document.getElementById(`chart-${p.id}`);
  if (!wrap || !p._history?.length) return;

  const prices = p._history.map(h => h.price);
  const min    = Math.min(...prices);
  const max    = Math.max(...prices);
  const range  = max - min || 1;
  const W = 600, H = 56;

  // Single data point: draw a flat centred line so a chart shows from the first check
  if (prices.length === 1) {
    const y = H / 2;
    wrap.innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
           style="width:100%;height:100%;display:block">
        <line x1="0" y1="${y}" x2="${W}" y2="${y}"
              stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
        <circle cx="${W - 3}" cy="${y}" r="3" fill="#7c3aed"/>
      </svg>`;
    return;
  }

  const pts = prices.map((price, i) => {
    const x = (i / (prices.length - 1)) * W;
    const y = H - ((price - min) / range) * (H - 10) - 5;
    return `${x},${y}`;
  });

  const targetY = H - ((p.target_price - min) / range) * (H - 10) - 5;
  const targetLine = (p.target_price >= min && p.target_price <= max)
    ? `<line x1="0" y1="${targetY}" x2="${W}" y2="${targetY}"
             stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" opacity=".6"/>`
    : '';

  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
         style="width:100%;height:100%;display:block">
      ${targetLine}
      <polyline points="${pts.join(' ')}"
                fill="none" stroke="#7c3aed" stroke-width="2"
                stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${pts[pts.length-1].split(',')[0]}"
              cy="${pts[pts.length-1].split(',')[1]}"
              r="3" fill="#7c3aed"/>
    </svg>`;
}

// ── Add / Edit modal ──────────────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add product';
  document.getElementById('fName').value   = '';
  document.getElementById('fUrl').value    = '';
  document.getElementById('fTarget').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function openEditModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit product';
  document.getElementById('fName').value   = p.name;
  document.getElementById('fUrl').value    = p.url;
  document.getElementById('fTarget').value = p.target_price;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveProduct() {
  const name         = document.getElementById('fName').value.trim();
  const url          = document.getElementById('fUrl').value.trim().split('\n').map(u => u.trim()).filter(Boolean).join('\n');
  const target_price = parseFloat(document.getElementById('fTarget').value);

  if (!name || !url || isNaN(target_price) || target_price <= 0) {
    showToast('Please fill in all fields with valid values.');
    return;
  }

  const btn = document.getElementById('modalSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  try {
    if (editingId) {
      const oldTarget = products.find(x => x.id === editingId)?.target_price;
      const updated = await api(`/products/${editingId}`, {
        method: 'PATCH',
        body: JSON.stringify({ name, url, target_price }),
      });
      const idx = products.findIndex(x => x.id === editingId);
      if (idx >= 0) products[idx] = { ...products[idx], ...updated };

      // Auto-check if target price changed
      if (Number(target_price) !== Number(oldTarget)) {
        document.getElementById('modalOverlay').classList.remove('open');
        render();
        updateSubtitle();
        showToast('Target changed — running new check…');
        checkOne(editingId);
        return;
      }
    } else {
      const created = await api('/products', {
        method: 'POST',
        body: JSON.stringify({ name, url, target_price }),
      });
      products.unshift(created);
    }

    document.getElementById('modalOverlay').classList.remove('open');
    render();
    updateSubtitle();
    showToast(editingId ? 'Product updated.' : 'Product added. Running first check…');

    // If it's a new product, kick off an immediate check
    if (!editingId) {
      const newId = products[0].id;
      checkOne(newId);
    }
  } catch (e) {
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Save';
  }
}

// ── Check ─────────────────────────────────────────────────────────────────────
async function checkOne(id) {
  if (checking.has(id)) return;
  checking.add(id);
  renderCard(id);

  try {
    const result = await api(`/products/${id}/check`, { method: 'POST' });
    const idx = products.findIndex(x => x.id === id);
    if (idx >= 0) {
      products[idx] = { ...products[idx], ...result,
        last_price: result.price, last_checked_at: result.checked_at,
        extraction_method: result.method,
        url_results: JSON.stringify(result.url_results ?? []) };
    }
    if (result.status === 'target_hit') showToast(`✓ Target hit! $${result.price.toFixed(2)}`);
    // Don't update chart yet if manual entry is still needed — wait for saveManualUrlPrice
    if (result.status !== 'needs_attention') await loadAndDrawSparkline(id);
  } catch (e) {
    showToast('Check failed: ' + e.message);
  } finally {
    checking.delete(id);
    renderCard(id);
    updateSubtitle();
  }
}

function renderCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  const p = products.find(x => x.id === id);
  if (!p) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = cardHtml(p);
  card.replaceWith(tmp.firstElementChild);
  if (p._history?.length >= 1) drawSparkline(p);
}


// ── Pause / resume ────────────────────────────────────────────────────────────
async function toggleActive(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const isActive = p.active == null || Number(p.active) === 1;
  const newActive = isActive ? 0 : 1;

  try {
    const updated = await api(`/products/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ active: newActive }),
    });
    const idx = products.findIndex(x => x.id === id);
    if (idx >= 0) products[idx] = { ...products[idx], ...updated };
    render();
    showToast(newActive ? 'Resumed — will check daily again.' : 'Paused — skipped by the daily check.');
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteProduct(id) {
  const p = products.find(x => x.id === id);
  if (!confirm(`Delete "${p?.name}"?`)) return;
  try {
    await api(`/products/${id}`, { method: 'DELETE' });
    products = products.filter(x => x.id !== id);
    render();
    updateSubtitle();
    showToast('Product deleted.');
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Subtitle ──────────────────────────────────────────────────────────────────
function updateSubtitle() {
  const total = products.length;
  const hits  = products.filter(p => p.status === 'target_hit').length;
  const attn  = products.filter(p => p.status === 'needs_attention').length;

  let txt = total === 0 ? 'No products tracked yet.'
          : `${total} product${total !== 1 ? 's' : ''} tracked`;
  if (hits)  txt += ` · ${hits} at target`;
  if (attn)  txt += ` · ${attn} need attention`;

  document.getElementById('subtitle').textContent = txt;
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function statusLabel(s) {
  return { ok:'On track', target_hit:'Target hit!', needs_attention:'Needs attention', error:'Error', pending:'Pending' }[s] || s;
}

function relTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function escHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Start ─────────────────────────────────────────────────────────────────────
boot();
</script>
